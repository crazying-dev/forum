<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="妖精论坛 - 罗小黑战记社区">
    <meta name="theme-color" content="#6A8C89">
    <meta name="dns-prefetch-control" content="on">

    <title>妖精论坛</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="dns-prefetch" href="//assets.crazying-dev.top">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//img.crazying-dev.top">
    <link rel="dns-prefetch" href="//av.huijiwiki.com">

    <link rel="preconnect" href="//assets.crazying-dev.top" crossorigin>
    <link rel="preconnect" href="//cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="//img.crazying-dev.top" crossorigin>

    <link rel="preload" href="//assets.crazying-dev.top/text/one/CSS/main.css" as="style">
    <link rel="preload" href="//assets.crazying-dev.top/text/one/JS/AfterBody.js" as="script">
    <link rel="preload" href="//assets.crazying-dev.top/font/CEFFontsCJK.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="//assets.crazying-dev.top/text/one/CSS/main.css">

    <script>
    // 防闪屏：在 body 渲染前同步决定主题
    (function() {
        var h = new Date().getHours();
        if (h < 6 || h >= 18) {
            document.documentElement.classList.add('night-mode');
        }
    })();
    </script>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css" media="print" onload="this.media='all'">

    <script src="//cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

    <noscript>
        <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    </noscript>

</head>
<body id="body">

<header id="header">
    <a class="header-left" href="/">
        <img src="//img.crazying-dev.top/text/one/favicon.png" alt="logo" id="logo">
        <h1>妖精论坛</h1>
    </a>
    <div class="header-center">
        <div id='search'>
            <label for="search_input">
                <input id="search_input" placeholder="搜索帖子、用户...">
            </label>
            <button id="search_button">
                <img alt="search_Button_ICON" src="//img.crazying-dev.top/crazying-dev.top/search.svg" id="search_Button_ICON">
            </button>
        </div>
    </div>
    <div class="header-right">
        <ul>
            <li class="header-collapsible">
                <button class="header-btn" id="Easter-Egg" onclick="Easter_Egg()">
                    <i class="fa fa-gift"></i>
                    <span>彩蛋</span>
                </button>
            </li>
            <li class="header-collapsible header-setting">
                <button class="header-btn" id="settingBtn">
                    <i class="fa fa-cog"></i>
                    <span>设置</span>
                </button>
                <div class="setting-dropdown" id="settingDropdown">
                    <ul class="setting-dropdown-menu">
                        <li class="setting-dropdown-title">主题</li>
                        <li class="setting-dropdown-item" data-value="day">
                            <span class="setting-item-icon"></span>
                            <span class="setting-item-text">亮色</span>
                        </li>
                        <li class="setting-dropdown-item" data-value="night">
                            <span class="setting-item-icon"></span>
                            <span class="setting-item-text">暗色</span>
                        </li>
                        <li class="setting-dropdown-item active" data-value="default">
                            <span class="setting-item-icon"></span>
                            <span class="setting-item-text">默认</span>
                        </li>
                        <li class="setting-dropdown-divider"></li>
                        <li class="setting-dropdown-item" id="logoutBtn" onclick="handleLogout()">
                            <span class="setting-item-icon"><i class="fa fa-sign-out"></i></span>
                            <span class="setting-item-text">退出登录</span>
                        </li>
                    </ul>
                </div>
            </li>
            <li class="header-collapsible">
                <a class="header-btn" id="LuoXiaoHeiWIKI" href="/WIKI">
                    <img src="https://av.huijiwiki.com/site_avatar_luoxiaohei_l.png?1781282427" alt="" id="WIKIForIcon">
                    <span>WIKI</span>
                </a>
            </li>
            <li class="header-collapsible">
                <a class="header-btn" id="HuiguanBtn" href="/huiguan">
                    <i class="fa fa-home"></i>
                    <span>会馆</span>
                </a>
            </li>
            <li class="header-collapsible">
                <a class="header-btn" id="RikanBtn" href="https://yaonews.unknownmp.top/" target="_blank" rel="noopener">
                    <i class="fa fa-newspaper-o"></i>
                    <span>日刊</span>
                </a>
            </li>
            <li class="header-collapsible">
                <button class="header-btn" id="DonateBtn" onclick="showDonateCard()">
                    <i class="fa fa-heart"></i>
                    <span>赞赏</span>
                </button>
            </li>
            <li class="header-menu-toggle" id="headerMenuToggle">
                <button class="header-btn" type="button">
                    <i class="fa fa-bars"></i>
                </button>
            </li>
            <li>
                <a id="UserInfo" href="#">
                    <div class="user-avatar" id="user-avatar">
                        <i class="fa fa-user"></i>
                    </div>
                    <div id="user-name" class="Username">登录</div>
                </a>
            </li>
        </ul>
        <div class="header-mobile-menu" id="headerMobileMenu">
            <a class="mobile-menu-item" href="/WIKI">
                <i class="fa fa-book"></i> WIKI
            </a>
            <a class="mobile-menu-item" href="/huiguan">
                <i class="fa fa-home"></i> 会馆
            </a>
            <a class="mobile-menu-item" href="https://yaonews.unknownmp.top/" target="_blank" rel="noopener">
                <i class="fa fa-newspaper-o"></i> 日刊
            </a>
            <button class="mobile-menu-item" onclick="showDonateCard()">
                <i class="fa fa-heart"></i> 赞赏
            </button>
            <button class="mobile-menu-item" onclick="Easter_Egg()">
                <i class="fa fa-gift"></i> 彩蛋
            </button>
            <div class="mobile-menu-divider"></div>
            <div class="mobile-menu-title">主题</div>
            <button class="mobile-menu-item mobile-theme-btn" data-value="day">
                <i class="fa fa-sun-o"></i> 亮色
            </button>
            <button class="mobile-menu-item mobile-theme-btn" data-value="night">
                <i class="fa fa-moon-o"></i> 暗色
            </button>
            <button class="mobile-menu-item mobile-theme-btn" data-value="default">
                <i class="fa fa-desktop"></i> 默认
            </button>
            <div class="mobile-menu-divider"></div>
            <button class="mobile-menu-item" onclick="handleLogout()">
                <i class="fa fa-sign-out"></i> 退出登录
            </button>
        </div>
    </div>
</header>

<div id="ui">{% if page_template %}{% include page_template %}{% endif %}</div>

<div id="footer-spacer"></div>

<div id="WindowsCardWithCenterSreen">
    <!-- 关闭按钮，调用 ShowOrhidenWindowsCardWithCenterSreen(0) -->
    <button class="windows-card-close" onclick="ShowOrhidenWindowsCardWithCenterSreen(0)">&times;</button>

    <div id="WindowsCardWithCenterSreenText" class="windows-card">
    </div>
</div>

<footer id="footer">
    <a href="/privacy" id="FooterPrivacy">隐私</a>
    <br>
    <br>
    联系方式<br>
    邮箱：3890320020@qq.com<br>
    <a href="https://github.com/crazying-dev">Github（大号）：crazying-dev</a><br>
    小红书：<a href="https://xhslink.com/m/7yCXhVvmCaJ">卡里</a><br>
    公众号：
    <span class="qr-hover-wrap">
        <span id="Footer公众号">悬停扫码</span>
        <img class="qr-img" src="//img.crazying-dev.top/crazying-dev.top/OfficialAccount.jpg" alt="公众号二维码">
    </span>
    <br>
    <br>
    <span class="footer-disclaimer">
        <i class="fa fa-info-circle"></i> 本二创无官方授权，仅粉丝公益创作
    </span>
    <br>
    <br>

</footer>

<div id="donate-modal" class="donate-modal" style="display:none;">
    <div class="donate-overlay" onclick="closeDonateCard()"></div>
    <div class="donate-card">
        <button class="donate-close" onclick="closeDonateCard()">&times;</button>
        <h3 class="donate-title"><i class="fa fa-heart"></i> 赞赏支持</h3>
        <p class="donate-subtitle">个人自发投喂，不为项目收益</p>
        <div class="donate-qr-wrap">
            <img src="//img.crazying-dev.top/other/help.png" alt="赞赏码">
        </div>
        <p class="donate-tip">你的支持是我持续创作的动力 ❤️</p>
    </div>
</div>

<script>
function showDonateCard() {
    var modal = document.getElementById('donate-modal');
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeDonateCard() {
    var modal = document.getElementById('donate-modal');
    modal.style.display = 'none';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var modal = document.getElementById('donate-modal');
        if (modal && modal.style.display === 'flex') {
            closeDonateCard();
        }
    }
});
</script>

<style>
.footer-disclaimer {
    font-size: 12px;
    color: var(--color-text-tertiary);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.footer-donate-btn {
    background: none;
    border: 1px solid var(--color-text-tertiary);
    color: var(--color-text-secondary);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    font: inherit;
}

.footer-donate-btn:hover {
    color: #e74c3c;
    border-color: #e74c3c;
}

.donate-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.donate-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
}

.donate-card {
    position: relative;
    background: var(--color-bg-card);
    border-radius: 16px;
    padding: 28px 32px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    animation: donateScaleIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes donateScaleIn {
    from {
        opacity: 0;
        transform: scale(0.95);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.donate-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    font-size: 22px;
    color: var(--color-text-tertiary);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.2s ease;
}

.donate-close:hover {
    color: var(--color-text-primary);
}

.donate-title {
    margin: 0 0 6px 0;
    font-size: 20px;
    color: var(--color-text-primary);
}

.donate-title i {
    color: #e74c3c;
}

.donate-subtitle {
    margin: 0 0 20px 0;
    font-size: 13px;
    color: var(--color-text-tertiary);
}

.donate-qr-wrap {
    width: 200px;
    height: 200px;
    margin: 0 auto 16px auto;
    border-radius: 12px;
    overflow: hidden;
    background: white;
    padding: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.donate-qr-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.donate-tip {
    margin: 0;
    font-size: 13px;
    color: var(--color-text-secondary);
}
</style>
<script src="//assets.crazying-dev.top/text/one/JS/AfterBody.js" defer></script>
</body>
</html>
