<div class="wiki-page">
    <div class="wiki-header">
        <h2>罗小黑Live2D模型</h2>
        <h6 style="color:red;">不可下载，仅供展示</h6>
    </div>

    <div class="live2d-container">
        <div id="live2d-canvas-wrapper" class="live2d-canvas-wrapper">
            <canvas id="live2d-canvas" class="live2d-canvas"></canvas>
            <div class="live2d-loading" id="live2d-loading">
                <div class="live2d-progress-container">
                    <div class="live2d-progress-bar">
                        <div class="live2d-progress-fill" id="live2d-progress-fill"></div>
                    </div>
                    <div class="live2d-progress-text" id="live2d-progress-text">初始化...</div>
                    <div class="live2d-progress-percent" id="live2d-progress-percent">0%</div>
                </div>
            </div>
            <div class="live2d-error" id="live2d-error" style="display:none;">
                <i class="fa fa-exclamation-triangle"></i>
                <span>加载失败，请刷新重试</span>
            </div>
        </div>
    </div>

    <div class="live2d-actions-section">
        <h3 class="live2d-actions-title">动作示例</h3>
        <div class="live2d-actions-grid">
            <div class="live2d-action-card">
                <div class="live2d-action-gif">
                    <img src="//assets.crazying-dev.top/text/one/Live2D/GIF/待机.gif" alt="待机" loading="lazy" decoding="async">
                </div>
                <span class="live2d-action-name">待机</span>
            </div>
            <div class="live2d-action-card">
                <div class="live2d-action-gif">
                    <img src="//assets.crazying-dev.top/text/one/Live2D/GIF/嘿咻.gif" alt="嘿咻" loading="lazy" decoding="async">
                </div>
                <span class="live2d-action-name">嘿咻</span>
            </div>
            <div class="live2d-action-card">
                <div class="live2d-action-gif">
                    <img src="//assets.crazying-dev.top/text/one/Live2D/GIF/惊醒.gif" alt="惊醒" loading="lazy" decoding="async">
                </div>
                <span class="live2d-action-name">惊醒</span>
            </div>
            <div class="live2d-action-card">
                <div class="live2d-action-gif">
                    <img src="//assets.crazying-dev.top/text/one/Live2D/GIF/起跳.gif" alt="起跳" loading="lazy" decoding="async">
                </div>
                <span class="live2d-action-name">起跳</span>
            </div>
            <div class="live2d-action-card">
                <div class="live2d-action-gif">
                    <img src="//assets.crazying-dev.top/text/one/Live2D/GIF/铁片.gif" alt="铁片" loading="lazy" decoding="async">
                </div>
                <span class="live2d-action-name">铁片</span>
            </div>
        </div>
    </div>

    <div class="wiki-footer">
        <p>点击模型可以互动哦~</p>
    </div>
</div>
