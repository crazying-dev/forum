<div class="home-container">
    <section class="home-quick-top">
        <a class="quick-top-entry" href="/World">
            <div class="quick-top-icon">
                <i class="fa fa-globe"></i>
            </div>
            <div class="quick-top-body">
                <div class="quick-top-name">世界频道</div>
                <div class="quick-top-desc">和小伙伴们一起聊天</div>
            </div>
            <i class="fa fa-chevron-right quick-top-arrow"></i>
        </a>
    </section>

    <section class="home-hero">
        <div class="home-hero-inner">
            <h1 class="home-hero-title">妖精论坛</h1>
            <p class="home-hero-subtitle">分享你的想法与故事</p>
            <div class="home-hero-actions">
                <a href="/forum" class="home-hero-btn secondary">
                    <i class="fa fa-list"></i> 论坛广场
                </a>
            </div>
        </div>
    </section>

    <section class="home-favorites" id="home-favorites" style="display:none;">
        <div class="home-feed-header">
            <h2 class="home-feed-title">
                <i class="fa fa-bookmark"></i> 我的收藏
            </h2>
        </div>
        <div class="home-post-list" id="home-favorites-list">
        </div>
    </section>

    <section class="home-feed">
        <div class="home-feed-header">
            <h2 class="home-feed-title">
                <i class="fa fa-random"></i> 随机推荐
                <span class="home-feed-tag" id="home-feed-tag">随机展示</span>
            </h2>
            <button class="home-refresh-btn" id="home-refresh-btn" onclick="refreshHomePosts()">
                <i class="fa fa-refresh"></i> 换一批
            </button>
        </div>

        <div class="home-post-list" id="home-post-list">
            <div class="forum-loading">加载中...</div>
        </div>
    </section>
</div>
