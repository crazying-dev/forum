<div class="auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>

        <div class="auth-form" id="loginForm">
            <div class="auth-header">
                <h2>欢迎回来</h2>
                <p>登录您的妖精论坛账号</p>
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-user"></i></span>
                <input type="text" id="loginName" placeholder="用户名或邮箱">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="loginPassword" placeholder="密码">
            </div>
            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>
            <button class="auth-btn primary" onclick="handleLogin()">登录</button>
            <div class="auth-error" id="loginError"></div>
        </div>

        <div class="auth-form" id="registerForm" style="display:none;">
            <div class="auth-header">
                <h2>加入我们</h2>
                <p>创建您的妖精论坛账号</p>
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-user"></i></span>
                <input type="text" id="regName" placeholder="用户名（2-20个字符）">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-envelope"></i></span>
                <input type="email" id="regEmail" placeholder="邮箱">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="regPassword" placeholder="密码（至少6位）">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="regConfirmPassword" placeholder="确认密码">
            </div>
            <button class="auth-btn primary" onclick="handleRegister()">注册</button>
            <div class="auth-error" id="registerError"></div>
        </div>

        <div class="auth-footer">
            <p>登录即表示您同意<a href="/privacy">隐私政策</a>和服务条款</p>
        </div>
    </div>
</div>
