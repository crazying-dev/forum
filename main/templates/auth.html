<div class="auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>

        <div class="auth-form" id="loginForm">
            <div class="auth-header">
                <h2>欢迎回来</h2>
                <p>登录您的妖精论坛账号</p>
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-user"></i></span>
                <input type="text" id="loginName" placeholder="用户名或邮箱">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="loginPassword" placeholder="密码">
            </div>
            <div class="auth-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>
            <button class="auth-btn primary" onclick="handleLogin()">登录</button>
            <div class="auth-error" id="loginError"></div>
        </div>

        <div class="auth-form" id="registerForm" style="display:none;">
            <div class="auth-header">
                <h2>加入我们</h2>
                <p>创建您的妖精论坛账号</p>
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-user"></i></span>
                <input type="text" id="regName" placeholder="用户名（2-20个字符）">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-envelope"></i></span>
                <input type="email" id="regEmail" placeholder="邮箱">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="regPassword" placeholder="密码（至少6位）">
            </div>
            <div class="auth-input-group">
                <span class="auth-icon"><i class="fa fa-lock"></i></span>
                <input type="password" id="regConfirmPassword" placeholder="确认密码">
            </div>
            <button class="auth-btn primary" onclick="handleRegister()">注册</button>
            <div class="auth-error" id="registerError"></div>
        </div>

        <div class="auth-footer">
            <p>登录即表示您同意<a href="/privacy">隐私政策</a>和服务条款</p>
        </div>
    </div>
</div>

<script>
const tabs = document.querySelectorAll('.auth-tab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

tabs.forEach(tab => {
    tab.addEventListener('click', function() {
        tabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tabName = this.getAttribute('data-tab');
        if (tabName === 'login') {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        } else {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
        }
        clearAuthErrors();
    });
});

function clearAuthErrors() {
    document.getElementById('loginError').textContent = '';
    document.getElementById('registerError').textContent = '';
}

function showAuthError(elementId, message) {
    document.getElementById(elementId).textContent = message;
}

function stripEasterEgg(name) {
    return name.replace(/<p[^>]*>/gi, '').replace(/<\/p>/gi, '');
}

function handleLogin() {
    const name = document.getElementById('loginName').value.trim();
    const password = document.getElementById('loginPassword').value;
    const remember = document.getElementById('rememberMe').checked;

    if (!name) {
        showAuthError('loginError', '请输入用户名或邮箱');
        return;
    }
    if (!password) {
        showAuthError('loginError', '请输入密码');
        return;
    }

    fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, password: password, remember: remember })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = '/';
        } else {
            showAuthError('loginError', data.message || '登录失败');
        }
    })
    .catch(() => {
        showAuthError('loginError', '网络错误，请稍后再试');
    });
}

function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;

    const nameNoEgg = stripEasterEgg(name);
    if (nameNoEgg.length < 2 || nameNoEgg.length > 20) {
        showAuthError('registerError', '用户名需要2-20个字符（不含彩蛋）');
        return;
    }
    if (!email || !email.includes('@')) {
        showAuthError('registerError', '请输入有效的邮箱');
        return;
    }
    if (password.length < 6) {
        showAuthError('registerError', '密码至少6位');
        return;
    }
    if (password !== confirmPassword) {
        showAuthError('registerError', '两次密码不一致');
        return;
    }

    fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, password: password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            window.location.href = '/';
        } else {
            showAuthError('registerError', data.message || '注册失败');
        }
    })
    .catch(() => {
        showAuthError('registerError', '网络错误，请稍后再试');
    });
}

document.getElementById('loginPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleLogin();
});
document.getElementById('regConfirmPassword').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleRegister();
});

document.getElementById('regName').addEventListener('input', function() {
    const name = this.value.trim();
    const nameNoEgg = stripEasterEgg(name);
    if (name && (nameNoEgg.length < 2 || nameNoEgg.length > 20)) {
        showAuthError('registerError', '用户名需要2-20个字符（不含彩蛋）');
    } else {
        showAuthError('registerError', '');
    }
});
</script>
